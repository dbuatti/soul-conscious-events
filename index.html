<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulFlow | Discover Soulful Events in Australia</title>
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="SoulFlow | Discover Soulful Events in Australia" />
    <meta property="og:description" content="Connect with events that nourish your mind, body, and spirit across Australia. Find workshops, meditations, concerts, and community gatherings." />
    <meta property="og:image" content="https://soulflowevents.vercel.app/social-preview.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://soulflowevents.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Fonts: Cormorant Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Google Maps JavaScript SDK for Places Autocomplete -->
    <script type="module">
      // Dynamically load Google Maps API key from environment variable
      const googleMapsApiKey = import.meta.env.VITE_GOOGLE_MAPS_API_KEY;
      console.log('index.html: VITE_GOOGLE_MAPS_API_KEY status:', googleMapsApiKey ? 'Loaded' : 'Not Found');
      if (googleMapsApiKey) {
        const script = document.createElement('script');
        // Use the 'callback' parameter to ensure the map is loaded before use
        script.src = `https://maps.googleapis.com/maps/api/js?key=${googleMapsApiKey}&libraries=places&callback=initMap`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      } else {
        console.error("Google Maps API Key is not defined. Please ensure VITE_GOOGLE_MAPS_API_KEY is set in your environment variables.");
      }
    </script>
    <script>
      // Define the global callback function for Google Maps API
      function initMap() {
        console.log('Google Maps API is fully loaded and ready!');
        // Dispatch a custom event to notify React components
        window.dispatchEvent(new Event('google-maps-api-ready'));
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
